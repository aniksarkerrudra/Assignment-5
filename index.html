<!DOCTYPE html>
<html>
<head>
<title>All Issues Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<!-- LOGIN PAGE -->

<div id="loginPage" class="flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-lg shadow-lg w-96">

<h1 class="text-3xl font-bold text-center mb-2">All Issue Tracker</h1>
<p class="text-center text-gray-500 mb-6">Login to continue</p>

<input id="username" class="border p-2 w-full mb-3 rounded" placeholder="Username">

<input id="password" type="password" class="border p-2 w-full mb-4 rounded" placeholder="Password">

<button onclick="login()" class="bg-blue-600 text-white w-full p-2 rounded hover:bg-blue-700">
Sign In
</button>

<p class="text-center text-sm mt-4 text-gray-500">
Demo: admin / admin123
</p>

</div>

</div>


<!-- MAIN PAGE -->

<div id="mainPage" class="hidden">

<!-- NAVBAR -->

<nav class="bg-white shadow p-4 flex justify-between items-center">

<div class="flex items-center gap-2">

<div class="bg-blue-600 text-white px-2 py-1 rounded font-bold">
GI
</div>

<h2 class="text-xl font-bold">All Issues</h2>

</div>

<div class="flex gap-2">

<input id="searchInput" class="border p-2 rounded" placeholder="Search issues">

<button onclick="searchIssues()" class="bg-blue-500 text-white px-4 rounded">
Search
</button>

</div>

</nav>



<div class="p-6">

<!-- TABS -->

<div class="flex gap-4 mb-4">

<button onclick="changeTab('all')" id="allTab" class="tabBtn bg-blue-500 text-white px-4 py-2 rounded">
All
</button>

<button onclick="changeTab('open')" id="openTab" class="tabBtn bg-gray-200 px-4 py-2 rounded">
Open
</button>

<button onclick="changeTab('closed')" id="closedTab" class="tabBtn bg-gray-200 px-4 py-2 rounded">
Closed
</button>

</div>



<!-- ISSUE SUMMARY -->

<div class="bg-white p-4 rounded shadow flex justify-between items-center mb-6">

<div class="flex items-center gap-3">

<div class="text-2xl">📋</div>

<div>

<p class="font-bold">
<span id="totalCount">0</span> Issues
</p>

<p class="text-gray-500 text-sm">
Issues in this repository
</p>

</div>

</div>

<div class="flex gap-4">

<div class="flex items-center gap-1 text-green-600">
● Open: <span id="openCount">0</span>
</div>

<div class="flex items-center gap-1 text-purple-600">
● Closed: <span id="closedCount">0</span>
</div>

</div>

</div>



<!-- LOADING SPINNER -->

<div id="spinner" class="text-center hidden">

<div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500 mx-auto"></div>

<p class="mt-2 text-gray-500">Loading issues...</p>

</div>



<!-- ISSUE CARDS -->

<div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5"></div>

</div>

</div>



<!-- MODAL -->

<div id="modal" class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center">

<div class="bg-white p-6 w-96 rounded-lg">

<h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>

<p id="modalDesc" class="mb-2"></p>

<p id="modalAuthor"></p>

<p id="modalPriority"></p>

<p id="modalLabel"></p>

<p id="modalDate"></p>

<button onclick="closeModal()" class="bg-red-500 text-white px-4 py-2 mt-4 rounded">
Close
</button>

</div>

</div>



<script>

const API="https://phi-lab-server.vercel.app/api/v1/lab/issues"



function login(){

const user=document.getElementById("username").value
const pass=document.getElementById("password").value

if(user==="admin" && pass==="admin123"){

document.getElementById("loginPage").classList.add("hidden")
document.getElementById("mainPage").classList.remove("hidden")

loadIssues()

}
else{

alert("Wrong username or password")

}

}



function changeTab(type){

document.querySelectorAll(".tabBtn").forEach(btn=>{
btn.classList.remove("bg-blue-500","text-white")
btn.classList.add("bg-gray-200")
})

document.getElementById(type+"Tab").classList.remove("bg-gray-200")
document.getElementById(type+"Tab").classList.add("bg-blue-500","text-white")

loadIssues(type)

}



async function loadIssues(type="all"){

document.getElementById("spinner").classList.remove("hidden")

let res=await fetch(API)

let data=await res.json()

let issues=data.data

updateCounts(issues)

if(type==="open"){
issues=issues.filter(i=>i.status==="open")
}

if(type==="closed"){
issues=issues.filter(i=>i.status==="closed")
}

displayIssues(issues)

document.getElementById("spinner").classList.add("hidden")

}



function updateCounts(issues){

let open=issues.filter(i=>i.status==="open").length
let closed=issues.filter(i=>i.status==="closed").length

document.getElementById("totalCount").innerText=issues.length
document.getElementById("openCount").innerText=open
document.getElementById("closedCount").innerText=closed

}



function displayIssues(issues){

const container=document.getElementById("issuesContainer")

container.innerHTML=""

issues.forEach(issue=>{

const border=issue.status==="open" ? "border-green-500" : "border-purple-500"

container.innerHTML+=`

<div onclick="showIssue(${issue.id})" class="bg-white border-t-4 ${border} p-4 rounded shadow cursor-pointer hover:scale-105 transition">

<h3 class="font-bold text-lg mb-1">${issue.title}</h3>

<p class="text-sm text-gray-600 mb-2">${issue.description}</p>

<p class="text-sm">Status: ${issue.status}</p>

<p class="text-sm">Author: ${issue.author}</p>

<p class="text-sm">Priority: ${issue.priority}</p>

<p class="text-sm">Label: ${issue.label}</p>

<p class="text-xs text-gray-400 mt-2">${issue.createdAt}</p>

</div>

`

})

}



async function showIssue(id){

const res=await fetch(`https://phi-lab-server.vercel.app/api/v1/lab/issue/${id}`)

const data=await res.json()

const issue=data.data

document.getElementById("modal").classList.remove("hidden")
document.getElementById("modal").classList.add("flex")

document.getElementById("modalTitle").innerText=issue.title
document.getElementById("modalDesc").innerText=issue.description
document.getElementById("modalAuthor").innerText="Author: "+issue.author
document.getElementById("modalPriority").innerText="Priority: "+issue.priority
document.getElementById("modalLabel").innerText="Label: "+issue.label
document.getElementById("modalDate").innerText="Created: "+issue.createdAt

}



function closeModal(){

document.getElementById("modal").classList.add("hidden")

}



async function searchIssues(){

const text=document.getElementById("searchInput").value

const res=await fetch(`https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q=${text}`)

const data=await res.json()

displayIssues(data.data)

}

</script>

</body>
</html>
